name: Pinterest Publisher

on:
  schedule:
    # 10 pins/jour : 2 slots x 5 pins (reduit depuis 20 pins/jour)
    # 08h Tunis = 07:00 UTC
    - cron: '0 7 * * *'
    # 17h Tunis = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Publish pins
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: python publish_period.py

      - name: Commit state files
        run: |
          git config user.name "pinterest-bot"
          git config user.email "bot@noreply.github.com"
          git add published_done.json boards.json publish_log.txt
          git diff --cached --quiet || git commit -m "publish: $(date -u +%Y-%m-%d_%Hh)"
          git push
